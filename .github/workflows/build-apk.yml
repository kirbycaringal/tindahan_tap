name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/android

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets into native project
        run: npx cap sync android

      - name: Add camera permission to AndroidManifest.xml
        run: |
          python3 - <<'EOF'
          path = 'android/app/src/main/AndroidManifest.xml'
          s = open(path).read()
          if 'android.permission.CAMERA' not in s:
              inject = (
                  '<uses-permission android:name="android.permission.CAMERA" />\n'
                  '    <uses-feature android:name="android.hardware.camera" android:required="false" />\n\n'
                  '    <application'
              )
              s = s.replace('<application', inject, 1)
              open(path, 'w').write(s)
              print("Camera permission injected.")
          else:
              print("Camera permission already present.")
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tindahan-pos-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
